<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; font-size: 13px; padding: 10px; }
    select { width: 100%; margin: 6px 0; padding: 6px; }
    #orderList { max-height: 280px; overflow-y: auto; border: 1px solid #ccc; padding: 8px; margin: 8px 0; }
    #orderList label { display: block; margin: 4px 0; cursor: pointer; }
    #saveBtn { margin-top: 8px; padding: 8px 14px; }
    #selectAllBtn, #selectNoneBtn { margin-right: 6px; padding: 4px 10px; }
    .hint { color: #666; font-size: 11px; margin-top: 4px; }
    #message { margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 13px; min-height: 1.2em; }
    #message.success { background: #e6f4ea; color: #137333; border: 1px solid #137333; }
    #message.error { background: #fce8e6; color: #c5221f; border: 1px solid #c5221f; }
    #message:empty { display: none; }
  </style>
</head>
<body>
  <p><strong>Select user</strong></p>
  <select id="userSelect">
    <option value="">-- Choose a user --</option>
  </select>
  <p><strong>Orders to track</strong> <span class="hint">(from job blocks / Sub Equipment Helper)</span></p>
  <p>
    <button type="button" id="selectAllBtn">Select All</button>
    <button type="button" id="selectNoneBtn">Select None</button>
  </p>
  <div id="orderList"></div>
  <button id="saveBtn">Save</button>
  <div id="message" role="status"></div>
  <script type="application/json" id="sidebar-data"><?!= (typeof sidebarData !== 'undefined' && sidebarData != null ? JSON.stringify(sidebarData).replace(/<\//g, '<\\/') : '{"users":[],"orders":[]}') ?></script>
  <script>
    var data = JSON.parse(document.getElementById('sidebar-data').textContent);
    var users = data.users || [];
    var orders = data.orders || [];
    var userSelect = document.getElementById('userSelect');
    var orderList = document.getElementById('orderList');
    var saveBtn = document.getElementById('saveBtn');
    var selectAllBtn = document.getElementById('selectAllBtn');
    var selectNoneBtn = document.getElementById('selectNoneBtn');
    var messageEl = document.getElementById('message');

    function showMessage(text, isError) {
      messageEl.textContent = text || '';
      messageEl.className = isError ? 'error' : 'success';
      messageEl.style.display = text ? 'block' : 'none';
    }

    selectAllBtn.addEventListener('click', function() {
      showMessage('');
      orderList.querySelectorAll('.order-cb').forEach(function(cb) { cb.checked = true; });
    });
    selectNoneBtn.addEventListener('click', function() {
      orderList.querySelectorAll('.order-cb').forEach(function(cb) { cb.checked = false; });
      showMessage('');
    });

    (users || []).forEach(function(u) {
      var opt = document.createElement('option');
      opt.value = u.index;
      opt.textContent = u.label;
      userSelect.appendChild(opt);
    });

    (orders || []).forEach(function(o) {
      var label = document.createElement('label');
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = o.id;
      cb.className = 'order-cb';
      label.appendChild(cb);
      label.appendChild(document.createTextNode(' ' + o.label));
      orderList.appendChild(label);
    });

    userSelect.addEventListener('change', function() {
      showMessage('');
      var row = userSelect.value;
      if (!row) return;
      var rowNum = parseInt(row, 10);
      if (isNaN(rowNum) || rowNum < 2) return;
      google.script.run
        .withSuccessHandler(function(selected) {
          var set = {};
          (selected || []).forEach(function(id) { set[id] = true; });
          orderList.querySelectorAll('.order-cb').forEach(function(cb) {
            cb.checked = !!set[cb.value];
          });
        })
        .withFailureHandler(function(err) { showMessage('Could not load orders: ' + (err && err.message ? err.message : String(err)), true); })
        .getTrackedOrdersForRow(rowNum);
    });

    saveBtn.addEventListener('click', function() {
      showMessage('');
      var row = userSelect.value;
      if (!row) {
        showMessage('Select a user first.', true);
        return;
      }
      var rowNum = parseInt(row, 10);
      if (isNaN(rowNum) || rowNum < 2) {
        showMessage('Invalid selection.', true);
        return;
      }
      var selected = [];
      orderList.querySelectorAll('.order-cb:checked').forEach(function(cb) { selected.push(cb.value); });
      saveBtn.disabled = true;
      google.script.run
        .withSuccessHandler(function() {
          var count = selected.length;
          showMessage('Saved. ' + (count ? count + ' order' + (count === 1 ? '' : 's') + ' are now tracked for this user.' : 'No orders selected — tracking cleared for this user.'), false);
          saveBtn.disabled = false;
        })
        .withFailureHandler(function(err) {
          showMessage('Could not save: ' + (err && err.message ? err.message : String(err)), true);
          saveBtn.disabled = false;
        })
        .saveTrackedOrdersForRow(rowNum, selected);
    });
  </script>
</body>
</html>
